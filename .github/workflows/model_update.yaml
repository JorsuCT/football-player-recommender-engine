name: Recommender Update

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'datasets/general/clean_dataset.csv'

jobs:
  data-update:
    runs-on: ubuntu-latest

    steps:
    - name: Download the code
      uses: actions/checkout@v4

    - name: Configure Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependences
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt 

    - name: 1. Execute Leagues
      run: python leagues.py

    - name: 2. Execute Position
      run: python position.py

    - name: 3. Execute Clustering
      run: python clustering.py

    - name: Save and commit new data to Streamlit
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add .
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automatic update of clusters and stats" && git push)
